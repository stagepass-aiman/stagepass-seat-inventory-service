# ─────────────────────────────────────────────────────────────────────────────
# StagePass Seat Inventory Service — CI Pipeline
#
# Job sequence:
#   secrets-scan → unit-test → integration-test → sast → sca
#       → build-and-scan → ci (sentinel)
#
# Phase 3 build log §14: The 'ci' job is a sentinel. Branch protection
# requires "ci" to pass. All real jobs fan into it via `needs:`. Adding
# a new job never requires updating branch protection rules — just add
# it to the needs: list of the sentinel.
#
# Phase 3 build log §15: gitleaks runs as a CLI download, NOT via the
# gitleaks/gitleaks-action. The action requires a paid org license on
# GitHub Free plan's org context. CLI has no such restriction.
#
# Phase 3 build log §16: Trivy pinned to v0.31.0 — first clean release
# after the 2026-03-19 supply chain compromise where tags v0.0.1–v0.34.2
# had credential-stealing malware injected via force-pushed tags.
# PHASE 8 TODO: pin to full immutable commit SHA per GitHub security
# hardening guidance (https://docs.github.com/en/actions/security-guides/
# security-hardening-for-github-actions#using-third-party-actions).
# NEVER use @master or mutable version tags for security scanning tools.
#
# RULE-19: SAST (SonarQube) has continue-on-error: true until SonarQube
# is cloud-accessible. Local instance not reachable from GitHub Actions.
#
# RULE-20: JaCoCo minimum is 0.01 at scaffold time.
# PHASE 7 TODO: raise jacoco.minimum.coverage to 0.80.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stagepass-seat-inventory-service

jobs:

  # ── 1. Secrets scan ─────────────────────────────────────────────────────────
  # Phase 3 build log §15: gitleaks CLI, not gitleaks-action.
  # The action requires a paid org license. The CLI has no such restriction.
  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        # --no-git scans the working tree; --redact avoids printing secrets in logs
        run: gitleaks detect --source . --redact --no-git --exit-code 1

  # ── 2. Unit tests ───────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        # -pl . -am: run this module only (no multi-module parent here, kept for consistency)
        # Failsafe runs ITs — exclude them here; they need Testcontainers
        run: mvn test -B --no-transfer-progress

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: target/site/jacoco/
          retention-days: 7

  # ── 3. Integration tests (Testcontainers) ───────────────────────────────────
  integration-test:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run integration tests
        # Failsafe plugin runs *IT.java classes.
        # Testcontainers pulls postgres:16-alpine and redis:7-alpine at runtime.
        # Docker is available on ubuntu-latest GitHub-hosted runners.
        run: mvn verify -B --no-transfer-progress -Dsurefire.skip=true

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: target/failsafe-reports/
          retention-days: 7

  # ── 4. SAST ─────────────────────────────────────────────────────────────────
  # RULE-19: continue-on-error until SonarQube is cloud-accessible.
  # PHASE 8 TODO: remove continue-on-error, add SONAR_TOKEN secret.
  sast:
    name: SAST (SonarQube + Semgrep)
    runs-on: ubuntu-latest
    needs: unit-test
    continue-on-error: true          # RULE-19
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0             # SonarQube needs full history for blame

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build for SonarQube (with coverage)
        run: mvn verify -B --no-transfer-progress -Pcoverage

      - name: SonarQube scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://localhost:9000' }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || 'no-token' }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=stagepass-seat-inventory-service \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN} \
            -B --no-transfer-progress

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/java p/owasp-top-ten"

  # ── 5. SCA ───────────────────────────────────────────────────────────────────
  sca:
    name: SCA (OWASP Dependency-Check)
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: OWASP Dependency-Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.trivyignore \
            -B --no-transfer-progress
        continue-on-error: true      # NVD feed rate limits fail in CI; PHASE 8 TODO: add NVD_API_KEY

      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 7

  # ── 6. Build + Container scan ────────────────────────────────────────────────
  build-and-scan:
    name: Build Image + Trivy Scan
    runs-on: ubuntu-latest
    needs: [ unit-test, integration-test ]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests — already run)
        run: mvn package -Dmaven.test.skip=true -B --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true              # load into local Docker so Trivy can scan it

      - name: Trivy container scan
        # v0.31.0: first clean release after 2026-03-19 supply chain compromise.
        # Tags v0.0.1–v0.34.2 had credential-stealing malware injected via
        # force-pushed tags. v0.36.0 does not exist — versioning jumped post-incident.
        # PHASE 8 TODO: pin to full immutable commit SHA.
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          trivyignores: .trivyignore

      - name: Push image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 7. Sentinel ─────────────────────────────────────────────────────────────
  # Phase 3 build log §14: Branch protection requires exactly this job name.
  # All real jobs must be listed in needs:. sast is continue-on-error so it
  # does not block the sentinel — its failure is logged but not blocking.
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [ secrets-scan, unit-test, integration-test, sast, sca, build-and-scan ]
    if: always()
    steps:
      - name: Check all required jobs passed
        # sast uses continue-on-error — we allow it to fail at this stage.
        # All other jobs must have succeeded (result == 'success').
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"
          for job in secrets-scan unit-test integration-test sca build-and-scan; do
            result=$(echo $results | jq -r ".[\"$job\"].result")
            if [ "$result" != "success" ]; then
              echo "FAILED: $job returned $result"
              exit 1
            fi
          done
          echo "All required jobs passed."