# application.yml — StagePass Seat Inventory Service
# gRPC-only service: no REST business endpoints.
# HTTP server (server.port=8090) serves ONLY Spring Actuator endpoints
# (health/live, health/ready, /metrics for Prometheus scrape).
# gRPC business server runs on grpc.server.port=9090.
# Kubernetes NetworkPolicy: port 9090 → app:stagepass-booking-service only.
#                           port 8090 → observability namespace only.

spring:
  application:
    name: stagepass-seat-inventory-service

  datasource:
    url: ${SEAT_INVENTORY_DB_URL:jdbc:postgresql://localhost:5440/seat_inventory_db}
    username: ${SEAT_INVENTORY_DB_USER:seat_inventory}
    password: ${SEAT_INVENTORY_DB_PASSWORD:seat_inventory_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000

  jpa:
    hibernate:
      # validate: Hibernate checks schema against entities at startup.
      # If migrations don't match entities, startup FAILS. Intentional.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${SEAT_INVENTORY_REDIS_HOST:localhost}
      port: ${SEAT_INVENTORY_REDIS_PORT:6390}
      password: ${SEAT_INVENTORY_REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:29092}
    consumer:
      group-id: seat-inventory-service-consumer
      auto-offset-reset: earliest
      # Manual offset commit: commit only after successful processing + outbox write
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 10
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all           # Wait for all replicas to acknowledge (ADR-003)
      retries: 3
    listener:
      ack-mode: MANUAL_IMMEDIATE

# ── Server (Actuator only — no REST business endpoints) ────────
server:
  port: ${MANAGEMENT_PORT:8090}

# ── gRPC server ────────────────────────────────────────────────
# net.devh:grpc-spring-boot-starter auto-configures Netty on this port.
# Booking Service gRPC client points here.
grpc:
  server:
    port: ${GRPC_PORT:9090}
    # Keep-alive: prevent idle gRPC connection closure during low-traffic periods.
    keep-alive-time: 30s
    keep-alive-timeout: 5s
    permit-keep-alive-without-calls: true

# ── Management / Actuator ──────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # /actuator/health/liveness and /readiness
  health:
    redis:
      enabled: true
    db:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0   # 100% in dev/staging; reduce in production
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# ── Kafka topic names ──────────────────────────────────────────
# Centralised here so topic names never appear as string literals in code.
stagepass:
  kafka:
    topics:
      flash-sale-hold-requests: flash-sale.hold-requests
      flash-sale-hold-results: flash-sale.hold-results
      seat-state-changes: seat.state-changes
      seat-commands: seat.commands
  redis:
    seat-hold-ttl-seconds: 600     # NFR-REL-004: 10 minutes
    payment-extend-ttl-seconds: 300 # NFR-AVAIL-003: extend by 5 minutes
    idempotency-key-ttl-seconds: 3600 # Flash sale consumer idempotency window
    cooldown-ttl-seconds: 120      # THR-SEAT-04: cooling period after hold expiry
