# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties — StagePass Seat Inventory Service
#
# RULE-36: Without this file, sonar-scanner auto-detects SonarQube Cloud
# and fails with "mandatory properties" before continue-on-error can suppress
# it. This file forces local SonarQube config and prevents that failure.
#
# PHASE 8 TODO: add SONAR_TOKEN secret for real scanning.
#               Remove continue-on-error: true from ci.yml SAST job.
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=stagepass-seat-inventory-service
sonar.projectName=StagePass Seat Inventory Service
sonar.projectVersion=0.1.0

# Source and test roots (Java/Maven layout)
sonar.sources=src/main/java
sonar.tests=src/test/java

# Exclusions — generated proto stubs, test files, build output
sonar.exclusions=\
  **/generated-sources/**,\
  **/generated-test-sources/**,\
  **/node_modules/**,\
  **/target/**

# JaCoCo coverage report (generated by Maven verify)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Java source compatibility
sonar.java.source=21

# Organisation (required for SonarQube Cloud — also works for local)
sonar.organization=stagepass-aiman
